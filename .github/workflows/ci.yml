name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ v* ]
  pull_request:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ====================================================================
      # 1. SETUP ENVIRONMENT
      # ====================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0 # Needed for versioning from git history

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust toolchain
        run: |
          rustup override set nightly
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android
          rustup target add armv7-linux-androideabi

      - name: Setup Ccache for faster builds
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/build.gradle.kts', '**/gradle.properties') }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zygiskd/src -> ../build/intermediates/rust

      # ====================================================================
      # 2. CONFIGURE AND BUILD
      # ====================================================================
      - name: Build with Gradle
        run: ./gradlew zipRelease zipDebug -Porg.gradle.parallel=true -Porg.gradle.vfs.watch=true -Dorg.gradle.jvmargs=-Xmx2048m

      # ====================================================================
      # 3. PREPARE AND UPLOAD ARTIFACTS
      # ====================================================================
      - name: Prepare build artifacts
        if: success()
        id: prepare_artifacts
        run: |
          RELEASE_ZIP=$(find module/build/outputs/release -type f -name 'NyaZygisk-v*-release.zip')
          DEBUG_ZIP=$(find module/build/outputs/release -type f -name 'NyaZygisk-v*-debug.zip')

          RELEASE_NAME=$(basename "$RELEASE_ZIP" .zip)
          DEBUG_NAME=$(basename "$DEBUG_ZIP" .zip)

          echo "RELEASE_ZIP=${RELEASE_ZIP}" >> $GITHUB_OUTPUT
          echo "DEBUG_ZIP=${DEBUG_ZIP}" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "DEBUG_NAME=${DEBUG_NAME}" >> $GITHUB_OUTPUT

          unzip "$RELEASE_ZIP" -d "release-artifact"
          unzip "$DEBUG_ZIP" -d "debug-artifact"

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare_artifacts.outputs.RELEASE_NAME }}
          path: release-artifact/

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare_artifacts.outputs.DEBUG_NAME }}
          path: debug-artifact/

      - name: Upload Release Symbols
        uses: actions/upload-artifact@v4
        with:
          name: release-symbols
          path: zygiskd/build/symbols/release/

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: zygiskd/build/symbols/debug/

      - name: Publish artifacts to Telegram
        if: success() && github.event_name != 'pull_request'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
          RELEASE_ZIP: ${{ steps.prepare_artifacts.outputs.RELEASE_ZIP }}
          TITLE: NyaZygisk
          VERSION: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "::warning::Telegram secrets not configured, skipping upload"
            exit 0
          fi

          if [ ! -f "$RELEASE_ZIP" ]; then
            echo "::error::Release ZIP not found: $RELEASE_ZIP"
            exit 1
          fi

          COMMIT_MESSAGE=$(git log -1 --pretty=%B 2>/dev/null || echo "No commit message")

          # HTML 特殊字元跳脫
          escape_html() {
            sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'
          }
          SAFE_TITLE=$(printf '%s' "$TITLE" | escape_html)
          SAFE_BRANCH=$(printf '%s' "$BRANCH" | escape_html)
          SAFE_MESSAGE=$(printf '%s' "$COMMIT_MESSAGE" | escape_html)

          NL=$'\n'
          CAPTION="<b>${SAFE_TITLE}</b>${NL}"
          CAPTION+="Branch: ${SAFE_BRANCH}${NL}"
          CAPTION+="#ci_${VERSION}${NL}${NL}"
          CAPTION+="<blockquote>${SAFE_MESSAGE}</blockquote>${NL}${NL}"
          CAPTION+="<a href=\"${COMMIT_URL}\">Commit</a>${NL}"
          CAPTION+="<a href=\"${RUN_URL}\">Workflow run</a>"

          if [ ${#CAPTION} -gt 1024 ]; then
            echo "::warning::Caption exceeds 1024 chars, falling back to commit URL"
            CAPTION="${COMMIT_URL}"
          fi

          CURL_ARGS=(
            --silent --show-error --fail
            --request POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument"
            --form "chat_id=${TG_CHAT_ID}"
            --form "document=@${RELEASE_ZIP}"
            --form "parse_mode=HTML"
            --form-string "caption=${CAPTION}"
          )

          if [ -n "${TG_THREAD_ID:-}" ]; then
            CURL_ARGS+=(--form "message_thread_id=${TG_THREAD_ID}")
          fi

          echo "Uploading $(basename "$RELEASE_ZIP") to Telegram..."
          curl "${CURL_ARGS[@]}" >/dev/null
          echo "Upload completed."